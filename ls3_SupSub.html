    <h1>tag sub : ตัวห้อย</h1>
    <p>น้ำมีสูตรทางเคมีคือ H<sub>2</sub>O</p>
    <p>แก๊สคาร์บอนไดออกไซด์คือ CO<sub>2</sub></p>

        c<sup>2</sup></p>

    <p>ข้อความนี้ต้องการคำอธิบายเพิ่มเติม<sup>[1]</sup></p>
